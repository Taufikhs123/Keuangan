<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Keuangan</title>

<!-- PWA: Theme & Status Bar -->
<meta name="theme-color" content="#2d6a4f">
<meta name="mobile-web-app-capable" content="yes">

<!-- iOS: Add to Home Screen Support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Keuangan">

<!-- Icons (PNG files in repo, used by browser tab, iOS, Android install) -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<!-- Apple Touch Icon (iOS Home Screen) -->
<link rel="apple-touch-icon" href="icon-512.png">

<!-- Web App Manifest (separate file - required for Android "Install app") -->
<link rel="manifest" href="manifest.json">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#2d6a4f;--primary-light:#40916c;--primary-dark:#1b4332;
  --accent:#52b788;--accent-light:#74c69d;
  --bg:#f8f9fa;--white:#fff;--card:#fff;
  --text:#212529;--text-sec:#6c757d;--text-light:#adb5bd;
  --border:#dee2e6;--border-light:#e9ecef;
  --success:#28a745;--danger:#dc3545;--warning:#ffc107;--info:#17a2b8;
  --sidebar-w:220px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.1);--radius:8px;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* iOS Safe Areas (iPhone Dynamic Island / notch / home indicator) */
html,body{padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--primary-dark);color:#fff;overflow-y:auto;z-index:100;transition:transform .3s;padding-top:env(safe-area-inset-top)}
.sidebar-brand{padding:18px 16px;font-size:17px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px}
.sidebar-brand svg{width:22px;height:22px;fill:#74c69d}
.menu-item{display:flex;align-items:center;gap:10px;padding:11px 18px;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;font-size:13px;border-left:3px solid transparent}
.menu-item:hover{background:rgba(255,255,255,.08);color:#fff}
.menu-item.active{background:rgba(255,255,255,.12);color:#74c69d;border-left-color:#74c69d;font-weight:600}
.menu-item svg{width:18px;height:18px;fill:currentColor;flex-shrink:0;opacity:.7}
.menu-item.active svg{opacity:1}

/* TOPBAR */
.topbar{position:fixed;top:env(safe-area-inset-top);left:var(--sidebar-w);right:0;height:54px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 180px 0 24px;z-index:50}
.topbar h1{font-size:16px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.sync-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid transparent;user-select:none}
.sync-chip:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.sync-chip.connected{background:#d4edda;color:#155724;border-color:#28a745}
.sync-chip.syncing{background:#fff3cd;color:#856404;border-color:#ffc107}
.sync-chip.error{background:#f8d7da;color:#721c24;border-color:#dc3545}
.sync-chip.disconnected{background:#e9ecef;color:#6c757d;border-color:#adb5bd}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sync-chip.connected .sync-dot{background:#28a745;box-shadow:0 0 0 0 rgba(40,167,69,.7);animation:pulse 2s infinite}
.sync-chip.syncing .sync-dot{background:#ffc107;animation:spin 1s linear infinite}
.sync-chip.error .sync-dot{background:#dc3545}
.sync-chip.disconnected .sync-dot{background:#adb5bd}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(40,167,69,.7)}70%{box-shadow:0 0 0 8px rgba(40,167,69,0)}100%{box-shadow:0 0 0 0 rgba(40,167,69,0)}}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@media(max-width:768px){.sync-chip-text{display:none}.sync-chip{padding:6px 8px}}
.burger{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);margin-right:10px}

/* MAIN */
.main{margin-left:var(--sidebar-w);margin-top:calc(54px + env(safe-area-inset-top));padding:24px;padding-bottom:calc(24px + env(safe-area-inset-bottom));min-height:calc(100vh - 54px)}

/* GRID */
.row{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:20px}
.col{flex:1;min-width:200px}

/* STAT CARDS */
.stat-card{background:var(--card);border-radius:var(--radius);padding:18px;border:1px solid var(--border-light);box-shadow:var(--shadow)}
.stat-card .label{font-size:11px;color:var(--text-sec);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-card .value{font-size:22px;font-weight:700}
.stat-card .sub{font-size:11px;color:var(--text-sec);margin-top:3px}

/* HERO SALDO */
.hero-saldo{background:linear-gradient(135deg,var(--primary-dark),var(--primary));border-radius:var(--radius);padding:20px 24px;color:#fff;margin-bottom:16px;box-shadow:var(--shadow-md)}
.hero-saldo .hero-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;opacity:.8;margin-bottom:2px}
.hero-saldo .hero-val{font-size:32px;font-weight:800;letter-spacing:-0.5px}
.hero-saldo .hero-sub{font-size:12px;opacity:.7;margin-top:4px}
.hero-row{display:flex;gap:16px;margin-top:12px}
.hero-row .hero-item{flex:1;text-align:center;background:rgba(255,255,255,.12);border-radius:6px;padding:8px 6px}
.hero-row .hero-item .hi-label{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.3px}
.hero-row .hero-item .hi-val{font-size:15px;font-weight:700;margin-top:2px}

/* MINI GRID (2x2 on mobile) */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stats-grid .stat-card{padding:14px}
.stats-grid .stat-card .value{font-size:18px}

/* PANELS */
.panel{background:var(--card);border-radius:var(--radius);border:1px solid var(--border-light);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.panel-head{padding:14px 18px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.panel-head h3{font-size:15px;font-weight:600}
.panel-body{padding:18px}
.panel-body.np{padding:0}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-sec);background:var(--bg);border-bottom:2px solid var(--border-light);font-weight:600}
td{padding:9px 14px;border-bottom:1px solid var(--border-light);font-size:13px}
tr:hover td{background:#f1f8f5}
th.r,td.r{text-align:right}

.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.b-in{background:#d8f3dc;color:#1b4332}.b-out{background:#f8d7da;color:#842029}.b-saldo{background:#e9ecef;color:#495057}

.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s}
.btn-p{background:var(--primary);color:#fff;border-color:var(--primary)}.btn-p:hover{background:var(--primary-light)}
.btn-o{background:transparent;color:var(--text-sec);border-color:var(--border)}.btn-o:hover{background:var(--bg)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-x{background:none;border:none;color:var(--text-light);cursor:pointer;padding:3px 6px;border-radius:4px;font-size:15px}.btn-x:hover{color:var(--danger);background:#f8d7da}
.btn-step{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--primary);font-size:18px;font-weight:700;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.btn-step:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-step:active{transform:scale(.92)}

/* FORM */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--text-sec);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:var(--primary)}
.fr{display:flex;gap:10px}.fr .fg{flex:1}

/* INLINE ADD FORM */
.add-form{background:#f1f8f5;border:1px dashed var(--accent);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.add-form h4{font-size:13px;color:var(--primary);margin-bottom:12px;font-weight:600}

/* MONTH SELECTOR */
.month-nav{display:flex;align-items:center;gap:6px;position:relative}
.month-nav select{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;background:var(--white);cursor:pointer;outline:none}
.month-nav select:focus{border-color:var(--primary)}
.ym-btn{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text);transition:all .15s}
.ym-btn:hover{border-color:var(--primary);background:#f1f8f5}
.ym-btn .arrow{font-size:9px;opacity:.6}
.ym-popup{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:12px;z-index:200;min-width:260px}
.ym-popup .ym-year-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border-light)}
.ym-popup .ym-year-row button{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text)}
.ym-popup .ym-year-row button:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.ym-popup .ym-year-label{font-size:16px;font-weight:700;color:var(--primary)}
.ym-popup .ym-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.ym-popup .ym-mo{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 4px;font-size:12px;cursor:pointer;text-align:center;color:var(--text);transition:all .1s}
.ym-popup .ym-mo:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.ym-popup .ym-mo.has-data{background:#e8f5e9;border-color:var(--accent-light);font-weight:600}
.ym-popup .ym-mo.has-data:hover{background:var(--primary);color:#fff}
.ym-popup .ym-mo.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700}
.ym-popup .ym-today{margin-top:8px;padding-top:8px;border-top:1px solid var(--border-light);display:flex;justify-content:center}
.ym-popup .ym-today button{background:transparent;border:none;color:var(--primary);font-size:12px;font-weight:600;cursor:pointer}
.ym-popup .ym-today button:hover{text-decoration:underline}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;justify-content:center}
.donut-box{position:relative;flex-shrink:0}
.donut-box canvas{display:block}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-center .dv{font-size:16px;font-weight:700}.donut-center .dl{font-size:10px;color:var(--text-sec)}
.legend{display:flex;flex-direction:column;gap:6px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:12px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-item .lv{margin-left:auto;font-weight:600;font-family:'Consolas',monospace}

/* PROGRESS */
.progress{height:8px;background:var(--border-light);border-radius:4px;overflow:hidden;margin:5px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .4s}

/* HBAR */
.hbar{margin-bottom:12px}
.hbar-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.hbar-track{height:20px;background:var(--border-light);border-radius:4px;overflow:hidden}
.hbar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:600;color:#fff;transition:width .5s ease}
.hg{background:linear-gradient(90deg,var(--accent),var(--primary-light))}.hr{background:linear-gradient(90deg,#e76f51,#dc3545)}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:none;justify-content:center;align-items:flex-start;padding-top:80px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius);width:440px;max-width:92vw;box-shadow:var(--shadow-md);overflow:hidden}
.modal-h{padding:14px 18px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{font-size:15px;font-weight:600}
.modal-b{padding:18px}
.modal-f{padding:12px 18px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px;background:var(--bg)}

/* SETTINGS */
.cat-list{display:flex;flex-direction:column;gap:2px}
.cat-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border-light);transition:background .15s}
.cat-row:hover{background:#f1f8f5}
.cat-row .cat-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.cat-row .cat-info{flex:1;min-width:0}
.cat-row .cat-info .cat-name{font-weight:600;font-size:13px}
.cat-row .cat-info .cat-id{font-size:11px;color:var(--text-sec);font-family:'Consolas',monospace}
.cat-row .cat-type{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.cat-row .cat-actions{display:flex;gap:4px}
.type-income{background:#d8f3dc;color:#1b4332}
.type-expense{background:#fff3cd;color:#856404}
.type-both{background:#e9ecef;color:#495057}
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.add-cat-bar{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;padding:14px;background:#f1f8f5;border-radius:var(--radius);border:1px dashed var(--accent);margin-bottom:16px}
.add-cat-bar .fg{margin-bottom:0}

/* SAVINGS CARD */
.sav-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border-light);padding:16px;box-shadow:var(--shadow)}
.sav-card h4{font-size:14px;font-weight:600;margin-bottom:8px}
.sav-card .sav-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-sec);margin-bottom:2px}

.mono{font-family:'Consolas','Courier New',monospace}
.ts{color:var(--success)}.td{color:var(--danger)}.tm{color:var(--text-sec)}.fw{font-weight:700}
.fs{font-size:12px}.mt{margin-top:8px}
.scroll-y{max-height:450px;overflow-y:auto}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .topbar{left:0}.main{margin-left:0;padding:16px}.burger{display:block}
  .row{flex-direction:column}.col{min-width:100%}
  .donut-wrap{flex-direction:column}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .stats-grid .stat-card{padding:12px}
  .stats-grid .stat-card .value{font-size:16px}
  .stats-grid .stat-card .label{font-size:10px}
  .hero-saldo .hero-val{font-size:28px}
  .hero-row .hero-item .hi-val{font-size:13px}
  .fr{flex-direction:column;gap:6px}
  .add-form{padding:12px}
  .donut-chart-grid{grid-template-columns:1fr!important}
  td,th{padding:7px 8px;font-size:12px}
  .panel-body{padding:12px}
  .cat-row{flex-wrap:wrap;gap:6px}
  .cat-row .cat-type{font-size:10px}
  .add-cat-bar{flex-direction:column}
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95.49-7.4-2.96-6.93-6.93.24-2.04 1.64-3.8 3.54-4.53.52-.2 1.07.19 1.07.75v4.28c0 .55.45 1 1 1h4.28c.56 0 .95.55.75 1.07-.73 1.9-2.49 3.3-4.53 3.54z"/></svg>
    Keuangan
  </div>
  <nav id="nav"></nav>
</aside>

<header class="topbar">
  <div style="display:flex;align-items:center">
    <button class="burger" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>
    <h1 id="page-title">Dashboard</h1>
  </div>
  <div class="topbar-right" id="topbar-right"></div>
</header>

<!-- Floating Sync Indicator (always visible, top-right) -->
<div id="sync-chip" class="sync-chip disconnected" onclick="go('pengaturan')" title="Klik untuk pengaturan sync" style="position:fixed;top:calc(14px + env(safe-area-inset-top));right:20px;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.15)">
  <span class="sync-dot"></span>
  <span class="sync-chip-text" id="sync-chip-text">Not Connected</span>
</div>

<main class="main" id="main"></main>
<input type="file" id="import-file" accept=".xlsx,.xls" style="display:none" onchange="importExcel(event)">

<div class="modal-overlay" id="modal">
  <div class="modal"><div class="modal-h"><h3 id="mtitle"></h3><button class="btn-x" onclick="closeModal()">&times;</button></div>
    <div class="modal-b" id="mbody"></div>
    <div class="modal-f" id="mfoot"></div>
  </div>
</div>

<!-- SheetJS via CDN (loaded online) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// ===================== DATA =====================
let CATEGORIES = [
  {id:'makan',label:'Makan/Food',icon:'🍔'},
  {id:'gaji',label:'Gaji/Salary',icon:'💰',type:'income'},
  {id:'e_m',label:'E&M (Salary)',icon:'🏢',type:'income'},
  {id:'bonus',label:'Bonus',icon:'🎉',type:'income'},
  {id:'credit_card',label:'Credit Card',icon:'💳'},
  {id:'kirim_indo',label:'Kirim Indo',icon:'✈️'},
  {id:'utilities',label:'Utilities',icon:'💡'},
  {id:'tabungan',label:'Tabungan',icon:'🏦'},
  {id:'transport',label:'Transport',icon:'🚌'},
  {id:'belanja',label:'Belanja/Shopping',icon:'🛒'},
  {id:'hutang',label:'Hutang/Debt',icon:'📋'},
  {id:'kesehatan',label:'Kesehatan',icon:'🏥'},
  {id:'hiburan',label:'Hiburan',icon:'🎮'},
  {id:'pendidikan',label:'Pendidikan/UKT',icon:'🎓'},
  {id:'paidy',label:'Paidy',icon:'📱'},
  {id:'lainnya',label:'Lainnya',icon:'📌'}
];

let DATA = {};

// TABUNGAN (Savings goals)
let SAVINGS = [];
let savIdCounter = 1;

// STOK (Daily stock / shopping needs)
let STOCK = [];
let stockIdCounter = 1;

// ===================== HELPERS =====================
let CURRENCY = localStorage.getItem('keuangan_currency') || '¥';
const fmt = n => n==null||n===0 ? '-' : CURRENCY+Math.abs(n).toLocaleString('id-ID');
const fmtN = n => n==null||n===0 ? '-' : Math.abs(n).toLocaleString('id-ID');
function setCurrency(c){CURRENCY=c;localStorage.setItem('keuangan_currency',c);render();}
const isUA = e => e.ket&&e.ket.toLowerCase().includes('uang awal');
function calcM(ent){let i=0,o=0;ent.forEach(e=>{if(!isUA(e)){i+=e.d||0;o+=e.k||0}});return{income:i,expense:o,bal:i-o}}
function reCalc(ent){if(!ent.length)return;let s=ent[0].d-ent[0].k;ent[0].s=s;for(let i=1;i<ent.length;i++){s+=(ent[i].d||0)-(ent[i].k||0);ent[i].s=s}}
// Sort a month's entries by date (Uang awal stays first; blank dates go last). Mutates in place.
function sortMonthEntries(ent){
  if(!ent||ent.length<2)return;
  const ua=ent.filter(isUA);
  const rest=ent.filter(e=>!isUA(e));
  rest.sort((a,b)=>{
    const da=parseInt(a.tgl),db=parseInt(b.tgl);
    const va=isNaN(da)?9999:da,vb=isNaN(db)?9999:db;
    return va-vb; // stable: same-day entries keep input order
  });
  const sorted=ua.concat(rest);
  ent.length=0;
  for(const e of sorted)ent.push(e);
}
function getCatLabel(id){const c=CATEGORIES.find(c=>c.id===id);return c?c.icon+' '+c.label:id||'-'}
function getCatIcon(id){const c=CATEGORIES.find(c=>c.id===id);return c?c.icon:'📌'}
const MONTHS_ALL=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember','December'];

// Get all available year-month pairs
const MONTH_NAMES_ID=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','December'];
function getYMPairs(){
  const p=[];
  for(const[y,ms]of Object.entries(DATA))for(const m of Object.keys(ms))p.push({y,m});
  // Always include current month
  const now=new Date();
  const cy=String(now.getFullYear());
  const cm=MONTH_NAMES_ID[now.getMonth()];
  if(!p.some(x=>x.y===cy&&x.m===cm))p.push({y:cy,m:cm});
  // Sort chronologically
  return p.sort((a,b)=>{
    if(a.y!==b.y)return a.y.localeCompare(b.y);
    return MONTH_NAMES_ID.indexOf(a.m)-MONTH_NAMES_ID.indexOf(b.m);
  });
}
function getLastYM(){const p=getYMPairs();return p[p.length-1]}

// Get ending balance of the month immediately before [year, month]
function getPrevMonthEndingBalance(year,month){
  const all=[];
  for(const[y,ms]of Object.entries(DATA))for(const m of Object.keys(ms))all.push({y,m});
  all.sort((a,b)=>{
    if(a.y!==b.y)return a.y.localeCompare(b.y);
    return MONTH_NAMES_ID.indexOf(a.m)-MONTH_NAMES_ID.indexOf(b.m);
  });
  const targetIdx=MONTH_NAMES_ID.indexOf(month);
  let prev=null;
  for(const ym of all){
    const ymIdx=MONTH_NAMES_ID.indexOf(ym.m);
    if(ym.y<year||(ym.y===year&&ymIdx<targetIdx))prev=ym;
  }
  if(!prev)return 0;
  const entries=DATA[prev.y][prev.m];
  if(!entries||!entries.length)return 0;
  reCalc(entries);
  return entries[entries.length-1].s||0;
}

// Cascade: after editing a month, update Uang Awal of all subsequent months
function cascadeUpdateUangAwal(){
  const all=[];
  for(const[y,ms]of Object.entries(DATA))for(const m of Object.keys(ms))all.push({y,m});
  all.sort((a,b)=>{
    if(a.y!==b.y)return a.y.localeCompare(b.y);
    return MONTH_NAMES_ID.indexOf(a.m)-MONTH_NAMES_ID.indexOf(b.m);
  });
  for(let i=0;i<all.length;i++){
    const {y,m}=all[i];
    const entries=DATA[y][m];
    if(!entries||!entries.length)continue;
    sortMonthEntries(entries);
    reCalc(entries);
    // Update next month's Uang Awal
    if(i+1<all.length){
      const next=all[i+1];
      const nextEnt=DATA[next.y][next.m];
      const endBal=entries[entries.length-1].s||0;
      if(nextEnt&&nextEnt.length>0&&isUA(nextEnt[0])){
        nextEnt[0].d=endBal;
        nextEnt[0].k=0;
        reCalc(nextEnt);
      }
    }
  }
}

    </label>`;
  document.getElementById('mfoot').innerHTML='<button class="btn btn-o" onclick="closeModal()">Batal</button><button class="btn btn-p" onclick="doCopyMonth()">📋 Salin Sekarang</button>';

  const cm=MONTH_NAMES_ID[now.getMonth()];

async function doCopyMonth(){
  const targetY=document.getElementById('cm-year').value;
  const targetM=document.getElementById('cm-month').value;
  const mode=document.getElementById('cm-mode').value;
  const zeroAmt=document.getElementById('cm-zero').checked;
  if(targetY===selYear&&targetM===selMonth){
    alert('Bulan tujuan sama dengan bulan sumber. Pilih bulan lain.');
    return;
  }
  if(!await ensureCanEdit())return;
  const srcEnt=DATA[selYear]?.[selMonth]||[];
  const toCopy=srcEnt.filter(e=>!isUA(e)).map(e=>({
    tgl:e.tgl,
    ket:e.ket,
    cat:e.cat,
    d:zeroAmt?0:(e.d||0),
    k:zeroAmt?0:(e.k||0)
  }));
  if(!DATA[targetY])DATA[targetY]={};
  const existing=DATA[targetY][targetM];
  if(!existing||existing.length===0){
    // Fresh target month: start with Uang Awal from prev month
    const prevBal=getPrevMonthEndingBalance(targetY,targetM);
    DATA[targetY][targetM]=[{tgl:1,ket:'Uang awal',d:prevBal,k:0,cat:''}].concat(toCopy);
  }else{
    if(mode==='replace'){
      // Keep only Uang Awal, replace rest
      const ua=existing[0]&&isUA(existing[0])?existing[0]:{tgl:1,ket:'Uang awal',d:getPrevMonthEndingBalance(targetY,targetM),k:0,cat:''};
      DATA[targetY][targetM]=[ua].concat(toCopy);
    }else{
      // Append
      DATA[targetY][targetM]=existing.concat(toCopy);
    }
  }
  // Navigate to target month so user sees result
  selYear=targetY;selMonth=targetM;
  cascadeUpdateUangAwal();saveAll();closeModal();render();
  alert('✅ '+toCopy.length+' transaksi berhasil disalin ke '+targetM+' '+targetY+'.');
}

// Donut chart drawing
function drawDonut(canvasId,data,size=160){
  setTimeout(()=>{
    const cv=document.getElementById(canvasId);if(!cv)return;
    const ctx=cv.getContext('2d');
    cv.width=size*2;cv.height=size*2;cv.style.width=size+'px';cv.style.height=size+'px';
    ctx.scale(2,2);
    const total=data.reduce((s,d)=>s+d.value,0);
    if(total===0)return;
    const cx=size/2,cy=size/2,r=size/2-10,inner=r*0.62;
    let start=-Math.PI/2;
    data.forEach(d=>{
      const angle=(d.value/total)*Math.PI*2;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+angle);ctx.closePath();
      ctx.fillStyle=d.color;ctx.fill();
      start+=angle;
    });
    ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  },50);
}

// Combined progress donut: each segment = target, filled portion = current
function drawProgressDonut(canvasId,goals,size=200){
  setTimeout(()=>{
    const cv=document.getElementById(canvasId);if(!cv)return;
    const ctx=cv.getContext('2d');
    cv.width=size*2;cv.height=size*2;cv.style.width=size+'px';cv.style.height=size+'px';
    ctx.scale(2,2);
    const totalTarget=goals.reduce((s,g)=>s+g.target,0);
    if(totalTarget===0)return;
    const cx=size/2,cy=size/2,r=size/2-10,inner=r*0.6;
    let start=-Math.PI/2;
    // Draw each goal: faded bg for target, then bold color for current
    goals.forEach(g=>{
      const segAngle=(g.target/totalTarget)*Math.PI*2;
      const fillAngle=(Math.min(g.current,g.target)/totalTarget)*Math.PI*2;
      // Target portion (faded)
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+segAngle);ctx.closePath();
      ctx.fillStyle=g.color+'30';ctx.fill();
      // Border between segments
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
      // Current fill (bold)
      if(g.current>0){
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+fillAngle);ctx.closePath();
        ctx.fillStyle=g.color;ctx.fill();
      }
      start+=segAngle;
    });
    // Inner circle
    ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  },50);
}

// ===================== SYNC GUARD (Offline Warning) =====================
function isSyncOk(){
  // Considered "ok" when a Sheets URL is configured AND not in error state.
  // We treat 'idle', 'connected', 'syncing' as OK (will sync soon / synced).
  return !!gsUrl && gsStatus!=='error';
}

function confirmAsync(opts){
  return new Promise(resolve=>{
    const o=Object.assign({title:'Konfirmasi',message:'',yesText:'OK',noText:'Batal',icon:'⚠️',showCheckbox:false,checkboxText:'Jangan tanyakan lagi di sesi ini',danger:false},opts);
    document.getElementById('mtitle').textContent=o.title;
    document.getElementById('mbody').innerHTML=`
      <div style="display:flex;gap:14px;align-items:flex-start">
        <div style="font-size:34px;line-height:1;flex-shrink:0">${o.icon}</div>
        <div style="flex:1;line-height:1.6">${o.message}</div>
      </div>
      ${o.showCheckbox?`<label style="display:flex;align-items:center;gap:8px;margin-top:16px;padding:10px 12px;background:var(--bg);border-radius:6px;cursor:pointer;user-select:none">
        <input type="checkbox" id="cf-dont-remind" style="width:auto;margin:0;cursor:pointer">
        <span class="fs">${o.checkboxText}</span>
      </label>`:''}`;
    document.getElementById('mfoot').innerHTML=`
      <button class="btn btn-o" id="cf-no">${o.noText}</button>
      <button class="btn btn-p" id="cf-yes" ${o.danger?'style="background:var(--danger);border-color:var(--danger)"':''}>${o.yesText}</button>`;
    document.getElementById('modal').classList.add('open');
    const done=ok=>{
      const dr=o.showCheckbox&&document.getElementById('cf-dont-remind')?.checked||false;
      document.getElementById('modal').classList.remove('open');
      resolve({ok,dontRemind:dr});
    };
    document.getElementById('cf-yes').onclick=()=>done(true);
    document.getElementById('cf-no').onclick=()=>done(false);
  });
}

async function ensureCanEdit(){
  if(isSyncOk())return true;
  if(sessionStorage.getItem('keuangan_dont_remind_offline')==='1'){
    localStorage.setItem('keuangan_pending_local','1');
    return true;
  }
  const r=await confirmAsync({
    title:'Tidak Tersambung ke Cloud',
    icon:'⚠️',
    message:`<div class="fw" style="color:#856404;margin-bottom:8px">Aplikasi belum tersambung ke Google Sheets.</div>
      <div>Perubahan akan disimpan sementara di <strong>localStorage</strong> perangkat ini dan <strong>tidak akan diupload</strong> ke server.</div>
      <div style="margin-top:10px">Lanjutkan?</div>`,
    yesText:'Ya, lanjutkan',
    noText:'Batal',
    showCheckbox:true
  });
  if(r.ok){
    if(r.dontRemind)sessionStorage.setItem('keuangan_dont_remind_offline','1');
    localStorage.setItem('keuangan_pending_local','1');
    return true;
  }
  return false;
}

async function checkPendingOnInit(){
  const hasPending=localStorage.getItem('keuangan_pending_local')==='1';
  if(!gsUrl){
    // No cloud configured — just render whatever is in local
    return;
  }
  if(!hasPending){
    // Normal path: load fresh from sheets
    const ok=await gsLoad(false);
    if(ok){render();updateGSStatus();}
    return;
  }
  // Pending local changes + cloud is configured → ask user
  const r=await confirmAsync({
    title:'Data Lokal Belum Tersinkron',
    icon:'📥',
    message:`<div>Ditemukan perubahan di perangkat ini yang <strong>belum diupload</strong> ke Google Sheets.</div>
      <div style="margin-top:10px">Upload data lokal ke server sekarang?</div>
      <div class="fs tm" style="margin-top:12px;padding:8px;background:var(--bg);border-radius:6px">💡 Pilih "Ya" jika perubahan terakhir Anda lakukan di perangkat ini.<br>Pilih "Tidak" jika ingin pakai data dari Google Sheets.</div>`,
    yesText:'Ya, upload',
    noText:'Tidak'
  });
  if(r.ok){
    await gsSave();
    if(gsStatus==='connected'){
      localStorage.removeItem('keuangan_pending_local');
      alert('✅ Data lokal berhasil diupload ke Google Sheets!');
    }else{
      alert('⚠️ Gagal upload. Data lokal tetap tersimpan dan akan ditanyakan lagi nanti.');
    }
    render();updateGSStatus();
  }else{
    // Second confirmation — destructive
    const r2=await confirmAsync({
      title:'Hapus Data Lokal?',
      icon:'🗑️',
      danger:true,
      message:`<div class="fw" style="color:var(--danger);margin-bottom:8px">Data lokal yang belum tersinkron akan <strong>HILANG SELAMANYA</strong>.</div>
        <div>Apakah Anda yakin ingin menghapus dan mengambil data dari Google Sheets?</div>`,
      yesText:'Ya, hapus & ambil dari Sheets',
      noText:'Batal'
    });
    if(r2.ok){
      localStorage.removeItem('keuangan_pending_local');
      const ok=await gsLoad(false);
      if(ok)render();
      updateGSStatus();
    }
    // If user cancels both, leave pending=1; they'll be re-prompted next time
  }
}

}

function render(){
  buildNav();
  const t=document.getElementById('page-title'),m=document.getElementById('main'),tr=document.getElementById('topbar-right');
  switch(view.page){
    case 'dashboard':t.textContent='Dashboard';renderDash(m,tr);break;

    case 'tabungan':t.textContent='Tabungan';renderTabungan(m,tr);break;

function onYMChange(){
  const v=document.getElementById('sel-ym').value.split('|');
  selYear=v[0];selMonth=v[1];render();
}

async function addTx(){
  const tgl=parseInt(document.getElementById('af-tgl').value)||'';
  const type=document.getElementById('af-type').value;
  const cat=document.getElementById('af-cat').value;
  const ket=document.getElementById('af-ket').value.trim();
  const amt=parseInt(document.getElementById('af-amt').value)||0;
  if(!amt)return;
  if(!await ensureCanEdit())return;
  if(!DATA[selYear])DATA[selYear]={};
  if(!DATA[selYear][selMonth]){
    const prevBal=getPrevMonthEndingBalance(selYear,selMonth);
    DATA[selYear][selMonth]=[{tgl:1,ket:'Uang awal',d:prevBal,k:0,cat:''}];
  }
  const ent=DATA[selYear][selMonth];
  ent.push({tgl,ket:ket||getCatLabel(cat),d:type==='income'?amt:0,k:type==='expense'?amt:0,cat});
  cascadeUpdateUangAwal();saveAll();render();
  // Clear inputs
  document.getElementById('af-tgl').value='';
  document.getElementById('af-ket').value='';
  document.getElementById('af-amt').value='';
}
async function delTx(i){
  const ent=DATA[selYear]?.[selMonth];if(!ent||i<1)return;
  if(!await ensureCanEdit())return;
  ent.splice(i,1);cascadeUpdateUangAwal();saveAll();render();
}
function openEditTx(i){
  const ent=DATA[selYear]?.[selMonth];if(!ent||!ent[i])return;
  const e=ent[i];
  const isAwal=isUA(e);
  const type=e.d>0?'income':'expense';
  const amt=e.d>0?e.d:e.k;
  document.getElementById('mtitle').textContent=isAwal?'Edit Saldo Awal':'Edit Transaksi';
  document.getElementById('mbody').innerHTML=`
    <div class="fr">
      <div class="fg" style="flex:0 0 100px"><label>Tanggal</label><input type="number" id="et-tgl" value="${e.tgl||''}" min="1" max="31"></div>
      <div class="fg"><label>Tipe</label><select id="et-type" ${isAwal?'disabled':''}><option value="expense" ${type==='expense'?'selected':''}>Pengeluaran</option><option value="income" ${type==='income'?'selected':''}>Pemasukan</option></select></div>
    </div>
    <div class="fg"><label>Kategori</label><select id="et-cat" ${isAwal?'disabled':''}>${CATEGORIES.map(c=>`<option value="${c.id}" ${c.id===e.cat?'selected':''}>${c.icon} ${c.label}</option>`).join('')}</select></div>
    <div class="fg"><label>Keterangan</label><input type="text" id="et-ket" value="${(e.ket||'').replace(/"/g,'&quot;')}"></div>
    <div class="fg"><label>Jumlah (${CURRENCY})</label><input type="number" id="et-amt" value="${amt||0}" min="0"></div>
    ${isAwal?'<div class="fs tm" style="margin-top:8px">💡 Saldo awal otomatis dari bulan sebelumnya. Edit hanya jika perlu koreksi.</div>':''}`;
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-o" onclick="closeModal()">Batal</button><button class="btn btn-p" onclick="saveEditTx(${i})">Simpan</button>`;
  document.getElementById('modal').classList.add('open');
}
async function saveEditTx(i){
  const ent=DATA[selYear]?.[selMonth];if(!ent||!ent[i])return;
  if(!await ensureCanEdit())return;
  const e=ent[i];
  const isAwal=isUA(e);
  const tgl=parseInt(document.getElementById('et-tgl').value)||'';
  const ket=document.getElementById('et-ket').value.trim();
  const amt=parseInt(document.getElementById('et-amt').value)||0;
  e.tgl=tgl;
  e.ket=ket||e.ket;
  if(isAwal){
    e.d=amt;e.k=0;
  }else{
    const type=document.getElementById('et-type').value;
    e.cat=document.getElementById('et-cat').value;
    e.d=type==='income'?amt:0;
    e.k=type==='expense'?amt:0;
  }
  cascadeUpdateUangAwal();saveAll();closeModal();render();
}

// Get unallocated tabungan pool (total from dashboard tx with cat=tabungan minus already allocated)
function getUnallocated(){
  let totalFromTx=0;
  for(const ms of Object.values(DATA))for(const ent of Object.values(ms)){
    ent.forEach(e=>{if(e.cat==='tabungan'&&e.k>0)totalFromTx+=e.k});
  }
  // Allocated = sum of all 'unallocated_pool' history entries (negative tracks allocation)
  let allocated=0;
  SAVINGS.forEach(g=>(g.history||[]).forEach(h=>{
    if(h.source==='pool')allocated+=h.amount;
  }));
  return Math.max(0,totalFromTx-allocated);
}
function openAllocateModal(){
  const unalloc=getUnallocated();
  if(unalloc<=0){alert('Tidak ada saldo yang belum dialokasikan');return}
  if(SAVINGS.length===0){alert('Buat tujuan tabungan terlebih dahulu');return}
  document.getElementById('mtitle').textContent='Alokasikan Tabungan';
  document.getElementById('mbody').innerHTML=`
    <div class="fs tm" style="margin-bottom:12px">Saldo belum dialokasikan: <strong style="color:#fb8500">${fmt(unalloc)}</strong></div>
    <div class="fg"><label>Tujuan Tabungan</label><select id="al-goal">${SAVINGS.map(g=>`<option value="${g.id}">${g.name} (${fmt(g.current)} / ${fmt(g.target)})</option>`).join('')}</select></div>
    <div class="fg"><label>Jumlah (${CURRENCY})</label><input type="number" id="al-amt" max="${unalloc}" placeholder="0" autofocus></div>
    <div class="fg"><label>Catatan (opsional)</label><input type="text" id="al-note" placeholder="Contoh: Alokasi bulan Mei"></div>`;
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-o" onclick="closeModal()">Batal</button><button class="btn btn-p" onclick="doAllocate()">Alokasikan</button>`;
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('al-amt').focus(),100);
}
async function doAllocate(){
  const id=parseInt(document.getElementById('al-goal').value);
  const amt=parseInt(document.getElementById('al-amt').value)||0;
  const note=document.getElementById('al-note').value.trim();
  const unalloc=getUnallocated();
  if(amt<=0){alert('Jumlah harus lebih dari 0');return}
  if(amt>unalloc){alert('Jumlah melebihi saldo belum dialokasikan');return}
  if(!await ensureCanEdit())return;
  const g=SAVINGS.find(s=>s.id===id);if(!g)return;
  if(!g.history)g.history=[];
  g.current+=amt;
  g.history.push({date:new Date().toISOString().slice(0,10),type:'deposit',amount:amt,note:note||'Alokasi dari pool',source:'pool'});
  saveAll();closeModal();render();
}

async function saveSavingTx(id,type){
  const g=SAVINGS.find(s=>s.id===id);if(!g)return;
  const date=document.getElementById('st-date').value||new Date().toISOString().slice(0,10);
  const amt=parseInt(document.getElementById('st-amt').value)||0;
  const note=document.getElementById('st-note').value.trim();
  if(amt<=0){alert('Jumlah harus lebih dari 0');return}
  if(!await ensureCanEdit())return;
  if(!g.history)g.history=[];
  if(type==='deposit'){
    g.current+=amt;
    g.history.push({date,type:'deposit',amount:amt,note});
  }else{
    if(amt>g.current){if(!confirm('Jumlah tarik melebihi saldo. Lanjutkan?'))return}
    g.current=Math.max(0,g.current-amt);
    g.history.push({date,type:'withdraw',amount:amt,note});
  }
  saveAll();closeModal();render();
}
async function delSavingHistory(savId,idx){
  if(!confirm('Hapus riwayat ini? Saldo akan menyesuaikan.'))return;
  const g=SAVINGS.find(s=>s.id===savId);if(!g||!g.history||!g.history[idx])return;
  if(!await ensureCanEdit())return;
  const h=g.history[idx];
  // Reverse the transaction
  if(h.type==='deposit')g.current=Math.max(0,g.current-h.amount);
  else g.current+=h.amount;
  g.history.splice(idx,1);
  saveAll();render();
}

// Derive status from quantity vs minimum threshold (with legacy fallback)
function stockStatus(s){
  if(typeof s.qty!=='number')return s.status||'ok'; // legacy items (no qty)
  const m=typeof s.min==='number'?s.min:0;
  if(s.qty<=0)return 'out';
  if(s.qty<=m)return 'low';
  return 'ok';
}
// Quantity to restock to so the item leaves the shopping list
function stockRestockQty(s){const m=typeof s.min==='number'?s.min:0;return m>0?m+1:1;}
// Display "3 kg" or just "3"
function stockQtyText(s){
  if(typeof s.qty!=='number')return '';
  return s.qty+(s.unit?' '+s.unit:'');
}

async function addStockItem(){
  const name=document.getElementById('sk-name').value.trim();
  const icon=document.getElementById('sk-icon').value.trim();
  const qty=parseInt(document.getElementById('sk-qty').value);
  const min=parseInt(document.getElementById('sk-min').value);
  const unit=document.getElementById('sk-unit').value.trim();
  if(!name){alert('Masukkan nama barang');return}
  if(!await ensureCanEdit())return;
  STOCK.push({id:stockIdCounter++,name,icon:icon||'📦',qty:isNaN(qty)?0:qty,min:isNaN(min)?0:min,unit,note:''});
  saveAll();render();
}
async function quickAddStock(name,icon){
  // Avoid duplicates by name (case-insensitive)
  if(STOCK.some(s=>s.name.toLowerCase()===name.toLowerCase())){
    alert('"'+name+'" sudah ada di daftar.');
    return;
  }
  if(!await ensureCanEdit())return;
  STOCK.push({id:stockIdCounter++,name,icon,qty:2,min:1,unit:'',note:''});
  saveAll();render();
}
async function adjustStock(id,delta){
  const s=STOCK.find(x=>x.id===id);if(!s)return;
  if(typeof s.qty!=='number')s.qty=0;
  const nv=s.qty+delta;
  if(nv<0)return; // don't go negative
  if(!await ensureCanEdit())return;
  s.qty=nv;
  saveAll();render();
}
async function markBought(id){
  const s=STOCK.find(x=>x.id===id);if(!s)return;
  if(!await ensureCanEdit())return;
  s.qty=stockRestockQty(s); // restock just above minimum so it leaves the list
  saveAll();render();
}
async function markAllBought(){
  if(!confirm('Tandai semua barang di daftar belanja sebagai sudah dibeli (stok diisi ulang)?'))return;
  if(!await ensureCanEdit())return;
  STOCK.forEach(s=>{const st=stockStatus(s);if(st==='low'||st==='out')s.qty=stockRestockQty(s);});
  saveAll();render();
}
function openEditStock(id){
  const s=STOCK.find(x=>x.id===id);if(!s)return;
  const q=typeof s.qty==='number'?s.qty:0;
  const m=typeof s.min==='number'?s.min:0;
  document.getElementById('mtitle').textContent='Edit Barang';
  document.getElementById('mbody').innerHTML=`
    <div class="fr" style="align-items:flex-end">
      <div class="fg" style="flex:0 0 80px"><label>Icon</label><input type="text" id="ek-icon" value="${(s.icon||'').replace(/"/g,'&quot;')}" maxlength="2" style="text-align:center;font-size:18px"></div>
      <div class="fg" style="flex:1"><label>Nama Barang</label><input type="text" id="ek-name" value="${(s.name||'').replace(/"/g,'&quot;')}"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Stok Saat Ini</label><input type="number" id="ek-qty" value="${q}" min="0"></div>
      <div class="fg"><label>Minimum (ambang)</label><input type="number" id="ek-min" value="${m}" min="0"></div>
      <div class="fg"><label>Satuan</label><input type="text" id="ek-unit" value="${(s.unit||'').replace(/"/g,'&quot;')}" placeholder="kg, pcs, botol"></div>
    </div>
    <div class="fg"><label>Catatan (opsional)</label><input type="text" id="ek-note" value="${(s.note||'').replace(/"/g,'&quot;')}" placeholder="Contoh: merk tertentu, beli di toko X..."></div>
    <div class="fs tm" style="margin-top:8px">💡 Status otomatis: Habis jika stok 0, Menipis jika stok ≤ Minimum, selain itu Cukup.</div>`;
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-o" onclick="closeModal()">Batal</button><button class="btn btn-p" onclick="saveEditStock(${id})">Simpan</button>`;
  document.getElementById('modal').classList.add('open');
}
async function saveEditStock(id){
  const s=STOCK.find(x=>x.id===id);if(!s)return;
  if(!await ensureCanEdit())return;
  const q=parseInt(document.getElementById('ek-qty').value);
  const m=parseInt(document.getElementById('ek-min').value);
  s.icon=document.getElementById('ek-icon').value.trim()||'📦';
  s.name=document.getElementById('ek-name').value.trim()||s.name;
  s.qty=isNaN(q)?0:q;
  s.min=isNaN(m)?0:m;
  s.unit=document.getElementById('ek-unit').value.trim();
  s.note=document.getElementById('ek-note').value.trim();
  delete s.status; // remove legacy field; status is now derived
  saveAll();closeModal();render();
}
async function delStockItem(id){
  const s=STOCK.find(x=>x.id===id);if(!s)return;
  if(!confirm('Hapus "'+s.name+'" dari daftar?'))return;
  if(!await ensureCanEdit())return;
  STOCK=STOCK.filter(x=>x.id!==id);
  saveAll();render();
}
function copyShoppingList(){
  const toBuy=STOCK.map(s=>({s,st:stockStatus(s)})).filter(x=>x.st==='low'||x.st==='out')
    .sort((a,b)=>(a.st==='out'?0:1)-(b.st==='out'?0:1)||a.s.name.localeCompare(b.s.name));
  if(!toBuy.length){alert('Daftar belanja kosong.');return}
  const today=new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  const txt='🛒 Daftar Belanja ('+today+')\n'+toBuy.map(({s,st})=>`☐ ${s.icon||''} ${s.name}${s.note?' ('+s.note+')':''}${st==='out'?' [HABIS]':' [sisa '+(stockQtyText(s)||'0')+']'}`).join('\n');
  const done=()=>{alert('✅ Daftar belanja disalin!\n\n'+txt);};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>{prompt('Salin daftar belanja:',txt);});
  }else{prompt('Salin daftar belanja:',txt);}
}

function addCategory(){
  const icon=document.getElementById('nc-icon').value.trim()||'📌';
  const id=document.getElementById('nc-id').value.trim().toLowerCase().replace(/\s+/g,'_');
  const label=document.getElementById('nc-label').value.trim();
  const type=document.getElementById('nc-type').value;
  if(!id||!label){alert('ID dan Nama harus diisi');return}
  if(CATEGORIES.find(c=>c.id===id)){alert('ID "'+id+'" sudah ada');return}
  const cat={id,label,icon};
  if(type)cat.type=type;
  CATEGORIES.push(cat);
  saveAll();render();
}

function openEditCat(idx){
  const c=CATEGORIES[idx];if(!c)return;
  document.getElementById('mtitle').textContent='Edit Kategori';
  document.getElementById('mbody').innerHTML=`
    <div class="fr">
      <div class="fg" style="flex:0 0 70px"><label>Icon</label><input type="text" id="ec-icon" value="${c.icon}" maxlength="2" style="text-align:center;font-size:18px"></div>
      <div class="fg"><label>Nama Kategori</label><input type="text" id="ec-label" value="${c.label}"></div>
    </div>
    <div class="fg"><label>Tipe</label><select id="ec-type"><option value="" ${!c.type?'selected':''}>Pengeluaran</option><option value="income" ${c.type==='income'?'selected':''}>Pemasukan</option></select></div>
    <div class="fg"><label>ID</label><input type="text" value="${c.id}" disabled style="background:#eee;color:#888"></div>
    <div class="fs tm" style="margin-top:4px">ID tidak dapat diubah karena digunakan oleh data transaksi.</div>`;
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-o" onclick="closeModal()">Batal</button><button class="btn btn-p" onclick="saveEditCat(${idx})">Simpan</button>`;
  document.getElementById('modal').classList.add('open');
}

function saveEditCat(idx){
  const c=CATEGORIES[idx];if(!c)return;
  c.icon=document.getElementById('ec-icon').value.trim()||c.icon;
  c.label=document.getElementById('ec-label').value.trim()||c.label;
  const type=document.getElementById('ec-type').value;
  if(type)c.type=type;else delete c.type;
  saveAll();closeModal();render();
}

function delCategory(idx){
  const c=CATEGORIES[idx];
  // Check if category is in use
  let used=0;
  for(const yr of Object.values(DATA))for(const ent of Object.values(yr))ent.forEach(e=>{if(e.cat===c.id)used++});
  const msg=used>0
    ?`Kategori "${c.label}" digunakan di ${used} transaksi. Transaksi tersebut akan menjadi tanpa kategori. Hapus?`
    :`Hapus kategori "${c.label}"?`;
  if(!confirm(msg))return;
  CATEGORIES.splice(idx,1);
  saveAll();render();
}

const APPS_SCRIPT_CODE = `function doGet(e){

  try{const v=sh.getRange('A1').getValue();if(v)json=String(v);}catch(err){}

function doPost(e){

  const json=e.postData.contents;
  const sh=getOrCreateDataSheet(ss);
  sh.getRange('A1').setValue(json);

}

function getOrCreateDataSheet(ss){
  let sh=ss.getSheetByName('_data');
  if(!sh)sh=ss.insertSheet('_data');
  try{if(!sh.isSheetHidden())sh.hideSheet();}catch(err){}
  return sh;
}

function populateSheets(ss,p){
  // Transaksi
  let tx=ss.getSheetByName('Transaksi')||ss.insertSheet('Transaksi');
  tx.clear();
  const txRows=[['Tahun','Bulan','Tanggal','Keterangan','Kategori ID','Kategori Nama','Pemasukan (¥)','Pengeluaran (¥)']];
  if(p.DATA)for(const y in p.DATA)for(const m in p.DATA[y])p.DATA[y][m].forEach(en=>{
    const c=(p.CATEGORIES||[]).find(x=>x.id===en.cat);
    txRows.push([y,m,en.tgl||'',en.ket||'',en.cat||'',c?c.label:'',en.d||0,en.k||0]);
  });
  tx.getRange(1,1,txRows.length,txRows[0].length).setValues(txRows);
  // Tabungan
  let sv=ss.getSheetByName('Tabungan')||ss.insertSheet('Tabungan');
  sv.clear();
  const svRows=[['Nama','Saat Ini (¥)','Target (¥)','Warna']];
  (p.SAVINGS||[]).forEach(g=>svRows.push([g.name,g.current,g.target,g.color]));
  sv.getRange(1,1,svRows.length,svRows[0].length).setValues(svRows);
  // Kategori
  let ct=ss.getSheetByName('Kategori')||ss.insertSheet('Kategori');
  ct.clear();
  const ctRows=[['ID','Nama','Icon','Tipe']];
  (p.CATEGORIES||[]).forEach(c=>ctRows.push([c.id,c.label,c.icon,c.type==='income'?'income':'expense']));
  ct.getRange(1,1,ctRows.length,ctRows[0].length).setValues(ctRows);
  // Riwayat Tabungan
  let hs=ss.getSheetByName('Riwayat Tabungan')||ss.insertSheet('Riwayat Tabungan');
  hs.clear();
  const hsRows=[['Nama Tabungan','Tanggal','Tipe','Jumlah (¥)','Catatan']];
  (p.SAVINGS||[]).forEach(g=>(g.history||[]).forEach(h=>{
    hsRows.push([g.name,h.date,h.type==='deposit'?'Setor':'Tarik',h.amount,h.note||'']);
  }));
  hs.getRange(1,1,hsRows.length,hsRows[0].length).setValues(hsRows);
  // Ringkasan (monthly summary)
  let rg=ss.getSheetByName('Ringkasan')||ss.insertSheet('Ringkasan');
  rg.clear();
  const rgRows=[['Tahun','Bulan','Pemasukan (¥)','Pengeluaran (¥)','Selisih (¥)']];
  if(p.DATA)for(const y in p.DATA)for(const m in p.DATA[y]){
    let income=0,expense=0;
    p.DATA[y][m].forEach(en=>{
      const isUA=en.ket&&en.ket.toLowerCase().indexOf('uang awal')>=0;
      if(!isUA){income+=en.d||0;expense+=en.k||0;}
    });
    rgRows.push([y,m,income,expense,income-expense]);
  }
  rg.getRange(1,1,rgRows.length,rgRows[0].length).setValues(rgRows);
  // Stok Belanja
  let sk=ss.getSheetByName('Stok Belanja')||ss.insertSheet('Stok Belanja');
  sk.clear();
  const skRows=[['Icon','Nama','Stok','Min','Satuan','Status','Catatan']];
  const stMap={ok:'Cukup',low:'Menipis',out:'Habis'};
  (p.STOCK||[]).forEach(it=>{
    var st;
    if(typeof it.qty==='number'){st=it.qty<=0?'out':(it.qty<=(it.min||0)?'low':'ok');}
    else{st=it.status||'ok';}
    skRows.push([it.icon||'',it.name||'',(typeof it.qty==='number'?it.qty:''),(typeof it.min==='number'?it.min:''),it.unit||'',stMap[st]||st,it.note||'']);
  });
  sk.getRange(1,1,skRows.length,skRows[0].length).setValues(skRows);
  // Remove default 'Sheet1' if empty
  try{const s1=ss.getSheetByName('Sheet1');if(s1&&s1.getLastRow()<=1&&s1.getLastColumn()<=1)ss.deleteSheet(s1);}catch(err){}
}`;

async function gsLoad(showAlerts){
  if(!gsUrl)return false;
  try{
    gsStatus='syncing';updateGSStatus();
    const res=await fetch(gsUrl+'?t='+Date.now(),{method:'GET',redirect:'follow'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    const data=JSON.parse(text);
    if(data.DATA)DATA=data.DATA;
    if(data.CATEGORIES&&Array.isArray(data.CATEGORIES)&&data.CATEGORIES.length>0)CATEGORIES=data.CATEGORIES;
    if(data.SAVINGS)SAVINGS=data.SAVINGS;
    if(data.savIdCounter)savIdCounter=data.savIdCounter;
    if(data.STOCK)STOCK=data.STOCK;
    if(data.stockIdCounter)stockIdCounter=data.stockIdCounter;
    gsStatus='connected';
    gsLastSync=new Date().toLocaleString('id-ID');
    localStorage.setItem('keuangan_gs_lastsync',gsLastSync);
    localStorage.removeItem('keuangan_pending_local');
    // Save to localStorage but don't trigger another sync
    try{
      localStorage.setItem(LS_KEYS.data,JSON.stringify(DATA));
      localStorage.setItem(LS_KEYS.cats,JSON.stringify(CATEGORIES));
      localStorage.setItem(LS_KEYS.savings,JSON.stringify(SAVINGS));
      localStorage.setItem(LS_KEYS.savId,String(savIdCounter));
      localStorage.setItem(LS_KEYS.stock,JSON.stringify(STOCK));
      localStorage.setItem(LS_KEYS.stockId,String(stockIdCounter));
    }catch(e){}
    updateGSStatus();
    if(showAlerts)alert('✅ Berhasil load data dari Google Sheets!');
    return true;
  }catch(e){
    console.warn('GS load failed:',e);
    gsStatus='error';gsLastError=e.message;
    updateGSStatus();
    if(showAlerts)alert('Gagal load: '+e.message);
    return false;
  }
}

async function gsSave(){
  if(!gsUrl)return false;
  try{
    gsStatus='syncing';updateGSStatus();
    const payload={DATA,CATEGORIES,SAVINGS,savIdCounter,STOCK,stockIdCounter};
    const res=await fetch(gsUrl,{
      method:'POST',
      body:JSON.stringify(payload),
      redirect:'follow'
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    gsStatus='connected';
    gsLastSync=new Date().toLocaleString('id-ID');
    localStorage.setItem('keuangan_gs_lastsync',gsLastSync);
    localStorage.removeItem('keuangan_pending_local');
    updateGSStatus();
    return true;
  }catch(e){
    console.warn('GS save failed:',e);
    gsStatus='error';gsLastError=e.message;
    // Mutation that triggered this save is now pending
    localStorage.setItem('keuangan_pending_local','1');
    updateGSStatus();
    return false;
  }
}

function scheduleGSSync(){

  if(gsSyncTimer)clearTimeout(gsSyncTimer);
  gsSyncTimer=setTimeout(()=>gsSave(),1500);
}

async function connectGS(){
  const url=document.getElementById('gs-url-input').value.trim();
  if(!url){alert('Masukkan URL Apps Script terlebih dahulu');return}
  if(!url.includes('script.google.com')){alert('URL tidak valid. Harus berupa URL Apps Script (script.google.com)');return}
  gsUrl=url;
  localStorage.setItem('keuangan_gs_url',url);
  // Ask: load from sheets or push local data?
  const hasLocal=Object.keys(DATA).length>0||SAVINGS.length>0;
  let pushLocal=false;
  if(hasLocal){
    pushLocal=confirm('Kamu sudah punya data lokal. Pilih:\n\nOK = Push data lokal ke Google Sheets (data di sheets akan tertimpa)\nCancel = Load dari Google Sheets (data lokal akan tertimpa)');
  }
  if(pushLocal){
    await gsSave();
    alert('✅ Data lokal sudah di-push ke Google Sheets!');
  }else{
    await gsLoad(true);
  }
  render();
}

function disconnectGS(){
  if(!confirm('Putuskan koneksi Google Sheets? Data tetap ada di Sheets dan localStorage.'))return;
  gsUrl='';
  gsStatus='';
  localStorage.removeItem('keuangan_gs_url');
  localStorage.removeItem('keuangan_gs_lastsync');
  render();
}

function updateGSStatus(){
  const el=document.getElementById('gs-status');
  if(el){
    let html='';
    if(gsStatus==='syncing')html='<span style="color:var(--primary)">🔄 Syncing...</span>';
    else if(gsStatus==='connected')html='<span style="color:var(--success)">✅ Connected · Last sync: '+gsLastSync+'</span>';
    else if(gsStatus==='error')html='<span style="color:var(--danger)">❌ Error: '+gsLastError+'</span>';
    else if(gsStatus==='idle')html='<span style="color:var(--text-sec)">⏸️ Idle</span>';
    el.innerHTML=html;
  }
  // Update floating sync chip
  const chip=document.getElementById('sync-chip');
  const chipText=document.getElementById('sync-chip-text');
  if(chip&&chipText){
    let cls='disconnected',txt='Not Connected',tip='Klik untuk setup Google Sheets';
    if(!gsUrl){cls='disconnected';txt='Not Connected';tip='Klik untuk setup Google Sheets';}
    else if(gsStatus==='syncing'){cls='syncing';txt='Syncing...';tip='Sedang sync ke Google Sheets';}
    else if(gsStatus==='connected'){cls='connected';txt='Synced';tip='Last sync: '+gsLastSync;}
    else if(gsStatus==='error'){cls='error';txt='Error';tip='Sync error: '+gsLastError+' (klik untuk lihat detail)';}
    else if(gsStatus==='idle'){cls='connected';txt='Connected';tip='Connected · Last sync: '+gsLastSync;}
    chip.className='sync-chip '+cls;
    chipText.textContent=txt;
    chip.title=tip;
  }
}

function buildWorkbook(){
  const wb=XLSX.utils.book_new();
  const txRows=[['Tahun','Bulan','Tanggal','Keterangan','Kategori ID','Kategori Nama','Pemasukan (¥)','Pengeluaran (¥)']];
  for(const[year,months]of Object.entries(DATA)){
    for(const[month,entries]of Object.entries(months)){
      entries.forEach(e=>{
        const catObj=CATEGORIES.find(c=>c.id===e.cat);
        txRows.push([year,month,e.tgl||'',e.ket||'',e.cat||'',catObj?catObj.label:'',e.d||0,e.k||0]);
      });
    }
  }
  const wsTx=XLSX.utils.aoa_to_sheet(txRows);
  wsTx['!cols']=[{wch:8},{wch:12},{wch:8},{wch:25},{wch:15},{wch:20},{wch:15},{wch:15}];
  XLSX.utils.book_append_sheet(wb,wsTx,'Transaksi');
  const savRows=[['Nama','Saat Ini (¥)','Target (¥)','Warna']];
  SAVINGS.forEach(g=>savRows.push([g.name,g.current,g.target,g.color]));
  const wsSav=XLSX.utils.aoa_to_sheet(savRows);
  wsSav['!cols']=[{wch:28},{wch:15},{wch:15},{wch:10}];
  XLSX.utils.book_append_sheet(wb,wsSav,'Tabungan');
  // Sheet: Riwayat Tabungan (history of all savings transactions)
  const histRows=[['Nama Tabungan','Tanggal','Tipe','Jumlah (¥)','Catatan']];
  SAVINGS.forEach(g=>{
    (g.history||[]).forEach(h=>{
      histRows.push([g.name,h.date,h.type==='deposit'?'Setor':'Tarik',h.amount,h.note||'']);
    });
  });
  const wsHist=XLSX.utils.aoa_to_sheet(histRows);
  wsHist['!cols']=[{wch:28},{wch:12},{wch:10},{wch:15},{wch:30}];
  XLSX.utils.book_append_sheet(wb,wsHist,'Riwayat Tabungan');
  const catListRows=[['ID','Nama','Icon','Tipe']];
  CATEGORIES.forEach(c=>catListRows.push([c.id,c.label,c.icon,c.type==='income'?'income':'expense']));
  const wsCatList=XLSX.utils.aoa_to_sheet(catListRows);
  wsCatList['!cols']=[{wch:15},{wch:22},{wch:6},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsCatList,'Kategori');
  const sumRows=[['Tahun','Bulan','Pemasukan (¥)','Pengeluaran (¥)','Selisih (¥)']];
  for(const[year,months]of Object.entries(DATA)){
    for(const[month,entries]of Object.entries(months)){
      const c=calcM(entries);
      sumRows.push([year,month,c.income,c.expense,c.bal]);
    }
  }
  const wsSum=XLSX.utils.aoa_to_sheet(sumRows);
  wsSum['!cols']=[{wch:8},{wch:12},{wch:15},{wch:15},{wch:15}];
  XLSX.utils.book_append_sheet(wb,wsSum,'Ringkasan');
  // Sheet: Stok Belanja
  const stMap={ok:'Cukup',low:'Menipis',out:'Habis'};
  const stockRows=[['Icon','Nama','Stok','Min','Satuan','Status','Catatan']];
  STOCK.forEach(it=>stockRows.push([it.icon||'',it.name||'',(typeof it.qty==='number'?it.qty:''),(typeof it.min==='number'?it.min:''),it.unit||'',stMap[stockStatus(it)]||'',it.note||'']));
  const wsStock=XLSX.utils.aoa_to_sheet(stockRows);
  wsStock['!cols']=[{wch:6},{wch:24},{wch:8},{wch:8},{wch:10},{wch:12},{wch:30}];
  XLSX.utils.book_append_sheet(wb,wsStock,'Stok Belanja');
  return wb;
}

let hasUnsavedChanges=false;

async function toggleAutoSave(){
  if(!autoSaveEnabled){
    if(!FSA_SUPPORTED){
      alert('Browser tidak support File System Access API.\n\nGunakan Chrome atau Edge versi terbaru. Atau gunakan tombol "Simpan ke Excel" secara manual.');
      return;
    }
    try{
      const handle=await window.showSaveFilePicker({
        suggestedName:'Keuangan.xlsx',
        types:[{description:'Excel File',accept:{'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':['.xlsx']}}]
      });
      // Test write immediately while user gesture is active
      const wb=buildWorkbook();
      const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
      const writable=await handle.createWritable();
      await writable.write(new Uint8Array(wbout));
      await writable.close();
      fileHandle=handle;
      autoSaveEnabled=true;
      hasUnsavedChanges=false;
      localStorage.setItem('keuangan_autosave','1');
      lastSavedInfo='✅ Auto-saved ke '+handle.name+' ('+new Date().toLocaleString('id-ID')+')';
      alert('Auto-Save aktif!\n\nFile "'+handle.name+'" akan otomatis ter-update setiap ada perubahan (tanpa popup, tanpa duplikat).');
    }catch(e){
      if(e.name==='AbortError')return;
      console.warn('FSA failed:',e);
      alert('Gagal mengaktifkan Auto-Save.\n\nError: '+e.message+'\n\nSolusi:\n1. Gunakan Chrome/Edge versi terbaru\n2. Atau gunakan tombol "Simpan ke Excel" manual setiap selesai edit');
      return;
    }
  }else{
    autoSaveEnabled=false;
    fileHandle=null;
    localStorage.setItem('keuangan_autosave','0');
  }
  render();
}

async function doAutoSave(){
  if(!autoSaveEnabled||!fileHandle)return;
  try{
    const perm=await fileHandle.queryPermission({mode:'readwrite'});
    if(perm!=='granted'){
      const req=await fileHandle.requestPermission({mode:'readwrite'});
      if(req!=='granted')throw new Error('Permission denied');
    }
    const wb=buildWorkbook();
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const writable=await fileHandle.createWritable();
    await writable.write(new Uint8Array(wbout));
    await writable.close();
    autoSaveCount++;
    hasUnsavedChanges=false;
    lastSavedInfo='✅ Auto-saved ke '+fileHandle.name+' ('+new Date().toLocaleString('id-ID')+')';
    updateAutoSaveStatus();
  }catch(e){
    console.warn('FSA write failed:',e);
    fileHandle=null;
    autoSaveEnabled=false;
    localStorage.setItem('keuangan_autosave','0');
    hasUnsavedChanges=true;
    lastSavedInfo='⚠️ Auto-save terputus. Hubungkan ulang file.';
    updateAutoSaveStatus();
  }
}

function updateAutoSaveStatus(){
  const el=document.getElementById('autosave-info');
  if(el)el.innerHTML=lastSavedInfo;
}

function scheduleAutoSave(){
  hasUnsavedChanges=true;
  if(!autoSaveEnabled||!fileHandle)return;
  if(autoSaveTimer)clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>doAutoSave(),1500);
}

function triggerImport(){document.getElementById('import-file').click()}

function importExcel(evt){
  const file=evt.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});

      // 1. Import Kategori (must be first so transactions can reference them)
      const catSheet=wb.Sheets['Kategori'];
      if(catSheet){
        const catData=XLSX.utils.sheet_to_json(catSheet);
        if(catData.length>0){
          CATEGORIES=catData.map(r=>{
            const cat={id:String(r['ID']||'').trim(),label:String(r['Nama']||'').trim(),icon:String(r['Icon']||'📌').trim()};
            if(String(r['Tipe']||'').trim()==='income')cat.type='income';
            return cat;
          }).filter(c=>c.id&&c.label);
        }
      }

      // 2. Import Transaksi
      const txSheet=wb.Sheets['Transaksi'];
      if(txSheet){
        const txData=XLSX.utils.sheet_to_json(txSheet);
        const newData={};
        txData.forEach(r=>{
          const year=String(r['Tahun']||'').trim();
          const month=String(r['Bulan']||'').trim();
          if(!year||!month)return;
          if(!newData[year])newData[year]={};
          if(!newData[year][month])newData[year][month]=[];
          const tgl=r['Tanggal']===''||r['Tanggal']==null?'':parseInt(r['Tanggal'])||'';
          newData[year][month].push({
            tgl,
            ket:String(r['Keterangan']||'').trim(),
            cat:String(r['Kategori ID']||'').trim(),
            d:parseInt(r['Pemasukan (¥)'])||0,
            k:parseInt(r['Pengeluaran (¥)'])||0
          });
        });
        DATA=newData;
      }

      // 3. Import Tabungan
      const savSheet=wb.Sheets['Tabungan'];
      if(savSheet){
        const savData=XLSX.utils.sheet_to_json(savSheet);
        if(savData.length>0){
          SAVINGS=savData.map((r,i)=>({
            id:i+1,
            name:String(r['Nama']||'').trim(),
            current:parseInt(r['Saat Ini (¥)'])||0,
            target:parseInt(r['Target (¥)'])||0,
            color:String(r['Warna']||DONUT_COLORS[i%DONUT_COLORS.length]).trim(),
            history:[]
          })).filter(s=>s.name);
          savIdCounter=SAVINGS.length+1;
        }
      }
      // Import Riwayat Tabungan (history)
      const histSheet=wb.Sheets['Riwayat Tabungan'];
      if(histSheet){
        const histData=XLSX.utils.sheet_to_json(histSheet);
        histData.forEach(r=>{
          const name=String(r['Nama Tabungan']||'').trim();
          const g=SAVINGS.find(s=>s.name===name);
          if(!g)return;
          if(!g.history)g.history=[];
          let dateStr=r['Tanggal'];
          // Excel might give us a number (date serial) or string
          if(typeof dateStr==='number'){
            const d=XLSX.SSF.parse_date_code(dateStr);
            dateStr=d.y+'-'+String(d.m).padStart(2,'0')+'-'+String(d.d).padStart(2,'0');
          }else{
            dateStr=String(dateStr||'').slice(0,10);
          }
          g.history.push({
            date:dateStr,
            type:String(r['Tipe']||'').toLowerCase().includes('tarik')?'withdraw':'deposit',
            amount:parseInt(r['Jumlah (¥)'])||0,
            note:String(r['Catatan']||'')
          });
        });
      }

      // Recalculate all saldo
      for(const months of Object.values(DATA))for(const ent of Object.values(months))reCalc(ent);

      // Update state
      const lm=getLastYM();selYear=lm.y;selMonth=lm.m;
      lastSavedInfo='Diimport dari: '+file.name+' ('+new Date().toLocaleString('id-ID')+')';
      saveAll();render();go('pengaturan');
      alert('Data berhasil diimport dari '+file.name+'!');
    }catch(err){
      alert('Gagal import file: '+err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
  evt.target.value=''; // reset so same file can be re-imported
}

function closeModal(){document.getElementById('modal').classList.remove('open')}

// Ctrl+S shortcut to save
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){
    e.preventDefault();
    if(autoSaveEnabled&&fileHandle){
      doAutoSave();
    }else{
      exportExcel();
    }
  }
});
// Warn before closing if there are unsaved changes
window.addEventListener('beforeunload',function(e){
  if(hasUnsavedChanges&&!autoSaveEnabled){
    e.preventDefault();
    e.returnValue='Ada perubahan yang belum disimpan ke Excel. Yakin ingin keluar?';
    return e.returnValue;
  }
});

render();
updateGSStatus();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(err=>console.warn('SW register failed:',err));
  });
}

// Auto-load from Google Sheets on startup, with pending-local check
setTimeout(()=>{checkPendingOnInit();},500);
